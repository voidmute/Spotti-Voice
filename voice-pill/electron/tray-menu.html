<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotti Voice</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
        --bg: #f7f7f8;
        --surface: #ffffff;
        --surface-hover: #f1f2f4;
        --text: #121218;
        --muted: #6b7280;
        --border: rgb(18 18 24 / 0.1);
        --danger: #dc2626;
        --danger-soft: #fff1f2;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        -webkit-user-select: none;
        user-select: none;
      }

      .menu {
        box-sizing: border-box;
        width: 100%;
        min-height: 100%;
        padding: 8px;
        border-radius: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow:
          0 16px 40px rgb(18 18 24 / 0.14),
          0 0 0 1px rgb(255 255 255 / 0.7) inset;
        opacity: 0;
        transform: translateY(6px) scale(0.98);
      }

      .menu.is-shown {
        animation: tray-menu-in 0.22s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes tray-menu-in {
        from {
          opacity: 0;
          transform: translateY(6px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .menu,
        .menu.is-shown {
          animation: none !important;
          opacity: 1;
          transform: none;
        }
      }

      .menu-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px 10px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 4px;
      }

      .menu-header img {
        width: 22px;
        height: 22px;
        object-fit: contain;
      }

      .menu-header span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      button {
        display: flex;
        align-items: center;
        width: 100%;
        margin: 0;
        padding: 10px 12px;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        text-align: left;
        cursor: pointer;
        transition: background 0.12s ease-out;
      }

      button:hover,
      button:focus-visible {
        outline: none;
        background: var(--surface-hover);
      }

      button:active {
        transform: scale(0.99);
      }

      .divider {
        height: 1px;
        margin: 4px 8px;
        background: var(--border);
      }

      button.danger {
        color: var(--danger);
      }

      button.danger:hover,
      button.danger:focus-visible {
        background: var(--danger-soft);
      }
    </style>
  </head>
  <body>
    <nav class="menu is-shown" role="menu" aria-label="Меню Spotti Voice">
      <div class="menu-header">
        <img src="../web/dist/brand-mark.png" alt="" aria-hidden="true" />
        <span>Spotti Voice</span>
      </div>
      <button type="button" data-action="show-pill">Показать виджет</button>
      <button type="button" data-action="setup">Настройки</button>
      <div class="divider" role="separator"></div>
      <button type="button" class="danger" data-action="quit">Выход</button>
    </nav>
    <script>
      const api = window.spottiTrayMenu;
      if (!api) {
        throw new Error("spottiTrayMenu bridge unavailable");
      }

      document.querySelectorAll("button[data-action]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const action = btn.getAttribute("data-action");
          if (action === "show-pill") void api.showPill();
          else if (action === "setup") void api.openSetup();
          else if (action === "quit") void api.quit();
        });
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") void api.dismiss();
      });

      const menu = document.querySelector(".menu");
      function reportMenuSize() {
        if (!menu) return;
        const rect = menu.getBoundingClientRect();
        void api.reportSize(Math.ceil(rect.width), Math.ceil(rect.height));
      }

      requestAnimationFrame(reportMenuSize);
      window.addEventListener("load", reportMenuSize);
    </script>
  </body>
</html>
